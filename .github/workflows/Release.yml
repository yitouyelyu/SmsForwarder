name: Release

# 触发器
on:
  push:
    tags:
      - v*
  pull_request:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      root_sol:
        description: "Release Title"
        required: true
        default: "SmsForwarder"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v4
      # 设置jdk环境为11
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          java-package: jdk
      # 获取打包秘钥
      - name: Setup Keystore  
        run: |  
          mkdir -p keystore  
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore/smsf.keystore
          echo "storeFile=../keystore/smsf.keystore" > keystore/keystore.properties  
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> keystore/keystore.properties  
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore/keystore.properties  
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore/keystore.properties
      # 打包release
      - name: Build with Gradle
        run: bash ./gradlew assembleRelease
      # 创建release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: SmsForwarder ${{ github.ref }}
          draft: false
          prerelease: false
      # 上传至release的资源
      - name: Upload release binaries
        uses: alexellis/upload-assets@0.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_paths: '["./build/app/outputs/apk/release/SmsF_*"]'
