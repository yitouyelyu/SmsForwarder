name: Release

# 触发器
on:
  push:
    tags:
      - v*
  pull_request:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      root_sol:
        description: "Release Title"
        required: true
        default: "SmsForwarder"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      output: "${{ github.workspace }}/build/app/outputs/apk/release"
    steps:
      # 检出代码
      - uses: actions/checkout@v4
      # 设置jdk环境为11
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          java-package: jdk
      # 获取打包秘钥
      - name: Setup Keystore  
        run: |  
          mkdir -p keystore  
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore/smsf.keystore
          echo "storeFile=../keystore/smsf.keystore" > keystore/keystore.properties  
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> keystore/keystore.properties  
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore/keystore.properties  
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore/keystore.properties
      # 打包release
      - name: Build with Gradle
        run: bash ./gradlew assembleRelease
      #上传APK
      - name: Upload App To Artifact armeabi-v7a
        if: success () || failure ()
        uses: actions/upload-artifact@v4
        with:
          name: "SmsF_armeabi-v7a_release.apk"
          path: "${{ env.output }}/SmsF_*_armeabi-v7a_release.apk"
      - name: Upload App To Artifact arm64-v8a
        if: success () || failure ()
        uses: actions/upload-artifact@v4
        with:
          name: "SmsF_arm64-v8a_release.apk"
          path: "${{ env.output }}/SmsF_*_arm64-v8a_release.apk"
